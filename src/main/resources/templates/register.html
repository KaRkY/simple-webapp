<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/root :: layout(~{::title}, ~{}, ~{::body})}">
<head>
    <title>Register</title>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
    <div class="card w-full max-w-sm bg-base-100 shadow-xl">
        <div class="card-body">
            <h1 class="card-title text-2xl justify-center">Register</h1>

            <div th:if="${error}" class="alert alert-error">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" method="post" class="flex flex-col gap-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="flex flex-col gap-1">
                    <label class="label" for="username"><span class="label-text">Username</span></label>
                    <input id="username" type="text" name="username" autocomplete="username" required autofocus
                           class="input input-bordered w-full"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label" for="password"><span class="label-text">Password</span></label>
                    <input id="password" type="password" name="password" autocomplete="new-password" required
                           class="input input-bordered w-full"/>
                </div>
                <button type="submit" class="btn btn-primary w-full">Register</button>
            </form>

            <p class="text-center text-sm">Already have an account? <a th:href="@{/login}" class="link link-primary">Sign in</a></p>
        </div>
    </div>
</body>
</html>
