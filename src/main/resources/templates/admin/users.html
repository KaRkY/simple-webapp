<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/admin :: layout(~{::title}, ~{::main})}">
<head>
    <title>User Management</title>
</head>
<body>
<main class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">User Management</h1>
        <div class="flex items-center gap-3">
            <p class="text-sm text-base-content/60">Logged in as: <span sec:authentication="name"></span></p>
            <a th:href="@{/admin/users(showDeleted=${!showDeleted})}"
               class="btn btn-sm btn-outline"
               th:text="${showDeleted} ? 'Hide deleted users' : 'Show deleted users'">
            </a>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="table table-zebra bg-base-100 shadow rounded-box">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="user-table-body">
                <th:block th:insert="~{admin/user-row :: userRows}"></th:block>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
