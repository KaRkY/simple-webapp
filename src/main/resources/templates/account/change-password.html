<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/user :: layout(~{::title}, ~{::main})}">
<head>
    <title>Change Password</title>
</head>
<body>
<main class="flex justify-center pt-10">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h1 class="card-title text-2xl">Change Password</h1>

            <div th:if="${param.success}" class="alert alert-success">
                <span>Password changed successfully.</span>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/account/change-password}" method="post" class="flex flex-col gap-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="flex flex-col gap-1">
                    <label class="label" for="currentPassword"><span class="label-text">Current password</span></label>
                    <input id="currentPassword" type="password" name="currentPassword" autocomplete="current-password" required autofocus
                           class="input input-bordered w-full"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label" for="newPassword"><span class="label-text">New password</span></label>
                    <input id="newPassword" type="password" name="newPassword" autocomplete="new-password" required
                           class="input input-bordered w-full"/>
                </div>
                <button type="submit" class="btn btn-primary w-full">Change password</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
