<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/root :: layout(~{::title}, ~{}, ~{::body})}">
<head>
    <title>Home</title>
</head>
<body class="min-h-screen bg-base-200">

    <!--/* === Unauthenticated === */-->
    <div sec:authorize="isAnonymous()" class="min-h-screen flex items-center justify-center">
        <div class="card w-full max-w-sm bg-base-100 shadow-xl">
            <div class="card-body">
                <h1 class="card-title text-2xl justify-center">Welcome</h1>

                <form th:action="@{/login}" method="post" class="flex flex-col gap-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="flex flex-col gap-1">
                        <label class="label" for="username"><span class="label-text">Username</span></label>
                        <input id="username" type="text" name="username" autocomplete="username" required autofocus
                               class="input input-bordered w-full"/>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="label" for="password"><span class="label-text">Password</span></label>
                        <input id="password" type="password" name="password" autocomplete="current-password" required
                               class="input input-bordered w-full"/>
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Sign in</button>
                </form>

                <p class="text-center text-sm">Don't have an account? <a th:href="@{/register}" class="link link-primary">Register</a></p>
            </div>
        </div>
    </div>

    <!--/* === Authenticated === */-->
    <div sec:authorize="isAuthenticated()" class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6">Welcome, <span sec:authentication="name"></span></h1>

        <ul class="menu bg-base-100 rounded-box w-56 shadow mb-4">
            <li><a th:href="@{/account/change-password}">Change password</a></li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/users}">Admin panel</a>
            </li>
        </ul>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline">Sign out</button>
        </form>
    </div>

</body>
</html>
