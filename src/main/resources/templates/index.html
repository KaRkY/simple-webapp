<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/root :: layout(~{::title}, ~{}, ~{::body})}">
<head>
    <title>Home</title>
</head>
<body>

    <!--/* === Unauthenticated === */-->
    <div sec:authorize="isAnonymous()">
        <h1>Welcome</h1>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div>
                <label for="username">Username</label>
                <input id="username" type="text" name="username" autocomplete="username" required autofocus/>
            </div>
            <div>
                <label for="password">Password</label>
                <input id="password" type="password" name="password" autocomplete="current-password" required/>
            </div>
            <button type="submit">Sign in</button>
        </form>

        <p>Don't have an account? <a th:href="@{/register}">Register</a></p>
    </div>

    <!--/* === Authenticated === */-->
    <div sec:authorize="isAuthenticated()">
        <h1>Welcome, <span sec:authentication="name"></span></h1>

        <nav>
            <ul>
                <li><a th:href="@{/account/change-password}">Change password</a></li>
                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin/users}">Admin panel</a>
                </li>
            </ul>
        </nav>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Sign out</button>
        </form>
    </div>

</body>
</html>
