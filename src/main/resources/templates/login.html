<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/root :: layout(~{::title}, ~{}, ~{::body})}">
<head>
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>

    <div th:if="${param.error}">
        <p>Invalid username or password.</p>
    </div>
    <div th:if="${param.logout}">
        <p>You have been logged out.</p>
    </div>
    <div th:if="${param.registered}">
        <p>Registration successful. Please log in.</p>
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div>
            <label for="username">Username</label>
            <input id="username" type="text" name="username" autocomplete="username" required autofocus/>
        </div>
        <div>
            <label for="password">Password</label>
            <input id="password" type="password" name="password" autocomplete="current-password" required/>
        </div>
        <button type="submit">Sign in</button>
    </form>

    <p>Don't have an account? <a th:href="@{/register}">Register</a></p>
</body>
</html>
