<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/root :: layout(~{::title}, ~{}, ~{::body})}">
<head>
    <title>Login</title>
</head>
<body class="min-h-screen flex items-center justify-center bg-base-200">
    <div class="card w-full max-w-sm bg-base-100 shadow-xl">
        <div class="card-body">
            <h1 class="card-title text-2xl justify-center">Login</h1>

            <div th:if="${param.error}" class="alert alert-error">
                <span>Invalid email or password.</span>
            </div>
            <div th:if="${param['not-activated']}" class="alert alert-warning">
                <span>Please activate your account. Check your inbox.</span>
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <span>You have been logged out.</span>
            </div>
            <div th:if="${param['check-email']}" class="alert alert-success">
                <span>Registration successful. Check your email to activate your account.</span>
            </div>
            <div th:if="${param.activated}" class="alert alert-success">
                <span>Account activated! You can now sign in.</span>
            </div>
            <div th:if="${param['activation-failed']}" class="alert alert-error">
                <span>Activation link is invalid or has expired.</span>
            </div>

            <form th:action="@{/login}" method="post" class="flex flex-col gap-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="flex flex-col gap-1">
                    <label class="label" for="email"><span class="label-text">Email</span></label>
                    <input id="email" type="email" name="email" autocomplete="email" required autofocus
                           class="input input-bordered w-full"/>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="label" for="password"><span class="label-text">Password</span></label>
                    <input id="password" type="password" name="password" autocomplete="current-password" required
                           class="input input-bordered w-full"/>
                </div>
                <button type="submit" class="btn btn-primary w-full">Sign in</button>
            </form>

            <p class="text-center text-sm">Don't have an account? <a th:href="@{/register}" class="link link-primary">Register</a></p>
        </div>
    </div>
</body>
</html>
