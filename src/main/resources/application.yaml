spring:
  application:
    name: simple-webapp
  modulith:
    events:
      completion-mode: archive
      jdbc:
        schema-initialization:
          enabled: false
    runtime:
      flyway-enabled: true

logging:
  level:
    org.jooq.Constants: WARN


management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - modulith